<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Central Node -->
  <circle cx="50" cy="50" r="8" fill="#3b82f6" filter="url(#glow)" />
  
  <!-- Outer Nodes -->
  <circle cx="20" cy="30" r="5" fill="#60a5fa" filter="url(#glow)" />
  <circle cx="80" cy="30" r="5" fill="#60a5fa" filter="url(#glow)" />
  <circle cx="50" cy="15" r="5" fill="#60a5fa" filter="url(#glow)" />
  <circle cx="20" cy="70" r="5" fill="#60a5fa" filter="url(#glow)" />
  <circle cx="80" cy="70" r="5" fill="#60a5fa" filter="url(#glow)" />
  <circle cx="50" cy="85" r="5" fill="#60a5fa" filter="url(#glow)" />

  <!-- Connections -->
  <line x1="50" y1="50" x2="20" y2="30" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
  <line x1="50" y1="50" x2="80" y2="30" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
  <line x1="50" y1="50" x2="50" y2="15" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
  <line x1="50" y1="50" x2="20" y2="70" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
  <line x1="50" y1="50" x2="80" y2="70" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
  <line x1="50" y1="50" x2="50" y2="85" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
  
  <!-- Inter-connections -->
  <path d="M20 30 Q 50 20 80 30" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 2" opacity="0.4" />
  <path d="M20 70 Q 50 80 80 70" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 2" opacity="0.4" />
</svg>
